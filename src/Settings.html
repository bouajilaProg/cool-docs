<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Cool Docs</title>
  <link rel="stylesheet" href="./css/settings.css">
  <link rel="stylesheet" href="./css/side-bar.css">
  <script src="js/main.js" type="module" defer></script>

  <script src="js/settings.js" type="module" defer></script>
</head>

<body>
  <!-- Loading overlay -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
      <div class="loading-spinner"></div>
      <p>Loading settings...</p>
    </div>
  </div>

  <div class="side-bar">

    <a href="/">
      <header>
        <img src="logo.png" alt="">
        <h2>Cool Docs</h2>
      </header>

    </a>
    <div class="lang-switcher">
      <label for="lang-switcher">Docs set</label>
      <select id="lang-switcher" aria-label="Select documentation set"></select>
    </div>
    <div id="side-root" class="link-container">
    </div>

    <footer>
      <i class="fa-solid fa-gear"></i>
      <a href="#Settings">
        Settings
      </a>
    </footer>
  </div>


  <div class="settings-panel">
    <h2>Settings</h2>


    <form id="form">
      <div class="form-actions">
        <button type="button" id="cancel-btn" class="cancel-btn">Cancel</button>
        <button type="submit" class="save-btn">Save</button>
      </div>

      <div class="form-group">
        <label for="language">Default docs set</label>
        <select id="language" name="language"></select>
      </div>

      <div class="form-group">
        <label for="code-theme">Code Theme</label>
        <select id="code-theme" name="code-theme">

          <option value="github-white">Github White</option>
          <option value="github-dark">Github Dark</option>
          <option value="monokai">Monokai</option>
          <option value="googlecode">Google Code</option>
          <option value="codepen">Codepen</option>
        </select>
      </div>
      <div class="form-group">
        <label for="import-data">Import Data</label>
        <button type="button" id="import-btn" class="import-btn">Import Documentation</button>
        <input type="file" id="import-file" accept=".zip,.json" style="display: none;">
      </div>
    </form>
  </div>
</body>

</html>
